<nav class="bg-white border-b border-zinc-200 py-4 px-8 flex items-center justify-between shadow-sm">

  <!-- Logo -->
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-amber-500 flex items-center justify-center">
      <i class="bi bi-tools text-white text-lg"></i>
    </div>
    <span class="text-zinc-800 font-medium text-2xl">
      Service <span class="text-amber-500">Solve</span>
    </span>
  </div>

  <!-- Usuário e logout -->
  {% if request.user.is_authenticated %}
  <div class="flex items-center gap-3">

    <a href="{% url 'users:user_detail' request.user.pk %}">
      <div class="flex items-center gap-2 bg-zinc-100 border border-zinc-300 rounded-lg px-3 py-1.5 hover:bg-zinc-200 transition-colors">
        <div class="w-6 h-6 rounded-full bg-amber-100 flex items-center justify-center">
          <i class="bi bi-person text-amber-600" style="font-size: 12px;"></i>
        </div>
        <span class="text-zinc-600 text-sm">{{ request.user.username }}</span>
        <span class="text-xs text-amber-600 font-medium">{{ request.user.get_user_type_display }}</span>
      </div>
    </a>

    <form method="POST" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit"
        class="flex items-center gap-2 border border-zinc-300 hover:border-zinc-400 bg-white hover:bg-zinc-100 text-zinc-500 hover:text-zinc-800 text-xs px-3 py-2 rounded-lg transition-colors">
        <i class="bi bi-box-arrow-right"></i>
        <span>Sair</span>
      </button>
    </form>

  </div>
  {% endif %}

</nav>
