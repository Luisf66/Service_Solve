<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @import "tailwindcss";
    @variant dark (&:where(.dark, .dark *));
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-zinc-100 text-zinc-800">

  <div class="flex flex-nowrap">
    <div class="flex-1 min-w-0">

      {% if messages %}
      <div class="px-4 pt-4 flex flex-col gap-2">
        {% for message in messages %}
        <div class="flex items-center justify-between px-4 py-3 rounded text-sm
          {% if message.tags == 'success' %}bg-green-100 border border-green-400 text-green-700
          {% elif message.tags == 'error' %}bg-red-100 border border-red-400 text-red-700
          {% elif message.tags == 'warning' %}bg-yellow-100 border border-yellow-400 text-yellow-700
          {% else %}bg-zinc-200 border border-zinc-400 text-zinc-600{% endif %}">
          <span>{{ message }}</span>
          <button onclick="this.parentElement.remove()"
            class="ml-4 text-current opacity-50 hover:opacity-100 transition-opacity">
            <i class="bi bi-x-lg" style="font-size: 12px;"></i>
          </button>
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <div class="py-3">
        <main>
          {% block content %}{% endblock %}
        </main>
      </div>

    </div>
  </div>

</body>
</html>
